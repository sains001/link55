<!DOCTYPE html>
<html>
<head>
  <title>WEB 55 PANEL</title>
  <style>
    body{
      margin:0;
      background:#111;
      color:white;
      font-family:Arial;
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    .panel{
      height:25vh;
      background:#1c1c1c;
      overflow:auto;
      padding:10px;
    }

    .web55{
      height:75vh;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th,td{
      border:1px solid #333;
      padding:6px;
      text-align:center;
    }

    .win{
      color:#00ff00;
      font-weight:bold;
    }

    .lose{
      color:#ff0000;
      font-weight:bold;
    }
  </style>
</head>
<body>

<div class="panel">
  <table>
    <thead>
      <tr>
        <th>Periode</th>
        <th>Prediksi</th>
        <th>Count</th>
        <th>Hasil</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="dataBody"></tbody>
  </table>
</div>

<div class="web55">
  <!-- GANTI LINK DI SINI -->
  <iframe src="https://55x4mqd.com"></iframe>
</div>

<script>

let currentRow=null;
let interval=null;
let resultDone=false;

function kategori(n){ return n<=4?"Kecil":"Besar"; }
function prediksi(){ return Math.random()>0.5?"Besar":"Kecil"; }

async function api(){
  const r=await fetch("https://link55.vercel.app/api");
  return await r.json();
}

function tambahBaris(periode){
  const tb=document.getElementById("dataBody");
  const tr=document.createElement("tr");
  const p=prediksi();

  tr.innerHTML=`
    <td>${periode}</td>
    <td>${p}</td>
    <td class="c">-</td>
    <td class="h">-</td>
    <td class="s">-</td>
  `;

  tb.insertBefore(tr,tb.firstChild);
  currentRow=tr;
}

function mulai(){
  clearInterval(interval);

  interval=setInterval(async()=>{
    const now=new Date();
    const sec=now.getSeconds();
    const sisa=sec<30?30-sec:60-sec;

    if(currentRow){
      currentRow.querySelector(".c").innerText=sisa;
    }

    if((sec===1||sec===31)&&!resultDone){
      resultDone=true;
      cekHasil();
    }

  },1000);
}

async function cekHasil(){
  const d=await api();
  const hasil=d.hasil;
  const kat=kategori(hasil);

  const pred=currentRow.children[1].innerText;
  const hCell=currentRow.querySelector(".h");
  const sCell=currentRow.querySelector(".s");

  hCell.innerText=kat+" "+hasil;

  if(pred===kat){
    sCell.innerText="WIN";
    sCell.className="s win";
  }else{
    sCell.innerText="LOSE";
    sCell.className="s lose";
  }

  setTimeout(init,2000);
}

async function init(){
  resultDone=false;
  const d=await api();
  tambahBaris(d.periode);
}

async function start(){
  const d=await api();
  tambahBaris(d.periode);
  mulai();
}

start();

</script>

</body>
</html>
