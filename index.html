<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WEB 55 PANEL</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.panel{
  height:25vh;
  background:#1c1c1c;
  overflow:auto;
  padding:10px;
}

.web55{
  height:75vh;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

th,td{
  border:1px solid #333;
  padding:6px;
  text-align:center;
}

th{
  background:#222;
}

.win{
  color:#00ff00;
  font-weight:bold;
}

.lose{
  color:#ff0000;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="panel">
  <table>
    <thead>
      <tr>
        <th>Periode</th>
        <th>Prediksi</th>
        <th>Count</th>
        <th>Hasil</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="dataBody"></tbody>
  </table>
</div>

<div class="web55">
  <iframe src="https://55x4mqd.com/#/home/"></iframe>
</div>

<script>

let currentRow = null;
let timer = null;
let resultChecked = false;
let lastPeriode = null;

function kategori(num){
  return num <= 4 ? "Kecil" : "Besar";
}

function buatPrediksi(){
  return Math.random() > 0.5 ? "Besar" : "Kecil";
}

async function ambilAPI(){
  try{
    const res = await fetch("https://link55.vercel.app/api?t="+Date.now());
    return await res.json();
  }catch(e){
    return null;
  }
}

function tambahBaris(periode){
  const tbody = document.getElementById("dataBody");
  const tr = document.createElement("tr");
  const pred = buatPrediksi();

  tr.innerHTML = `
    <td>${periode}</td>
    <td>${pred}</td>
    <td class="count">-</td>
    <td class="hasil">-</td>
    <td class="status">-</td>
  `;

  tbody.insertBefore(tr, tbody.firstChild);
  currentRow = tr;
}

function mulaiCountdown(){
  clearInterval(timer);

  timer = setInterval(async () => {

    const now = new Date();
    const sec = now.getSeconds();
    let sisa = sec < 30 ? 30 - sec : 60 - sec;

    if(currentRow){
      currentRow.querySelector(".count").innerText = sisa;
    }

    // cek hasil saat detik 1 & 31
    if((sec === 1 || sec === 31) && !resultChecked){
      resultChecked = true;
      cekHasil();
    }

  },1000);
}

async function cekHasil(){
  const data = await ambilAPI();
  if(!data || !currentRow) return;

  const hasil = data.hasil;
  const kategoriHasil = kategori(hasil);

  const hasilCell = currentRow.querySelector(".hasil");
  const statusCell = currentRow.querySelector(".status");
  const prediksi = currentRow.children[1].innerText;

  hasilCell.innerText = kategoriHasil + " " + hasil;

  if(prediksi === kategoriHasil){
    statusCell.innerText = "WIN";
    statusCell.className = "status win";
  }else{
    statusCell.innerText = "LOSE";
    statusCell.className = "status lose";
  }

  // cek apakah periode sudah ganti
  setTimeout(cekPeriodeBaru,2000);
}

async function cekPeriodeBaru(){
  const data = await ambilAPI();
  if(!data) return;

  if(data.periode !== lastPeriode){
    lastPeriode = data.periode;
    resultChecked = false;
    tambahBaris(data.periode);
  }
}

async function start(){
  const data = await ambilAPI();
  if(!data) return;

  lastPeriode = data.periode;
  tambahBaris(data.periode);
  mulaiCountdown();
}

start();

</script>

</body>
</html>
