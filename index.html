<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wingo Sync Panel</title>
<style>
body{
    margin:0;
    background:#000;
    font-family:Arial;
    color:#FFD700;
}

/* SPLIT */
.top{
    height:30vh;
    padding:10px;
    box-sizing:border-box;
    background:#000;
}

.bottom{
    height:70vh;
}

.bottom iframe{
    width:100%;
    height:100%;
    border:none;
}

/* PANEL STYLE */
.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.periode{
    font-size:18px;
}

.timer{
    font-size:32px;
    font-weight:bold;
}

.hasil{
    font-size:48px;
    text-align:center;
    margin-top:5px;
}

.k{ color:#00BFFF; }
.b{ color:#FF4444; }

.flash{
    animation:blink 0.5s linear 6;
}

@keyframes blink{
    50%{ opacity:0; }
}

.history{
    margin-top:10px;
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
}

.history div{
    padding:5px 8px;
    border:1px solid #FFD700;
    border-radius:6px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="top">

    <div class="row">
        <div class="periode" id="periode">Periode: -</div>
        <div class="timer" id="timer">30</div>
    </div>

    <div class="hasil" id="hasil">-</div>

    <div class="history" id="history"></div>

</div>

<div class="bottom">
    <iframe src="https://example.com"></iframe>
</div>

<script>

let historyData = [];

function getPeriode(){
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset()*60000);
    const d = new Date(utc);

    const year = d.getUTCFullYear();
    const month = String(d.getUTCMonth()+1).padStart(2,'0');
    const day = String(d.getUTCDate()).padStart(2,'0');

    const totalSeconds =
        d.getUTCHours()*3600 +
        d.getUTCMinutes()*60 +
        d.getUTCSeconds();

    const period = Math.floor(totalSeconds/30);

    return `${year}${month}${day}${String(period).padStart(4,'0')}`;
}

function getRemaining(){
    const now = new Date();
    const sec = now.getUTCSeconds();
    return 30 - (sec % 30);
}

function generateResult(period){
    let seed = 0;
    for(let i=0;i<period.length;i++){
        seed += period.charCodeAt(i);
    }
    return seed % 10;
}

function addHistory(val, kategori){
    historyData.unshift(val + kategori);
    if(historyData.length > 10){
        historyData.pop();
    }

    const historyEl = document.getElementById("history");
    historyEl.innerHTML = "";

    historyData.forEach(item=>{
        const div = document.createElement("div");
        div.innerText = item;
        historyEl.appendChild(div);
    });
}

let lastPeriode = null;

function update(){
    const periode = getPeriode();
    const sisa = getRemaining();

    document.getElementById("periode").innerText = "Periode: " + periode;
    document.getElementById("timer").innerText = sisa;

    if(periode !== lastPeriode){
        lastPeriode = periode;

        const angka = generateResult(periode);
        const kategori = angka <= 4 ? "K" : "B";

        const hasilEl = document.getElementById("hasil");
        hasilEl.innerText = angka + " (" + kategori + ")";
        hasilEl.className = "hasil " + (kategori==="K"?"k":"b") + " flash";

        addHistory(angka, kategori);
    }
}

setInterval(update,1000);
update();

</script>

</body>
</html>
