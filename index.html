<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web55</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111;
            color: white;
            height: 100vh;
            overflow-y: auto;
        }

        .top-section {
            height: 25vh;
            background: #1e1e1e;
            padding: 20px;
            border-bottom: 2px solid #333;
        }

        .bottom-section {
            height: 75vh;
            padding: 20px;
            overflow-y: auto;
        }

        h2 {
            margin-bottom: 10px;
        }

        .countdown {
            font-size: 28px;
            font-weight: bold;
            color: #00ff99;
        }

        .prediction-box {
            margin-top: 10px;
            padding: 10px;
            background: #222;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        th {
            background: #222;
        }

        .win {
            color: #00ff00;
            font-weight: bold;
        }

        .lose {
            color: #ff4444;
            font-weight: bold;
        }

        .besar {
            color: orange;
        }

        .kecil {
            color: cyan;
        }
    </style>
</head>
<body>

<div class="top-section">
    <h2>Periode: <span id="periode">-</span></h2>
    <div class="countdown">Sisa Waktu: <span id="timer">--</span> detik</div>

    <div class="prediction-box">
        <h3>Prediksi: <span id="prediksi">-</span></h3>
        <p>Status: <span id="status">Menunggu...</span></p>
    </div>
</div>

<div class="bottom-section">
    <h2>Riwayat Hasil</h2>
    <table>
        <thead>
            <tr>
                <th>Periode</th>
                <th>Angka</th>
                <th>Besar/Kecil</th>
                <th>Prediksi</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="resultTable">
        </tbody>
    </table>
</div>

<script>
let historyData = [];
let currentPeriode = null;

function getKategori(angka) {
    return angka >= 5 ? "Besar" : "Kecil";
}

function updateTimer() {
    const now = new Date();
    const seconds = now.getSeconds();
    const remaining = 30 - (seconds % 30);
    document.getElementById("timer").innerText = remaining;
}

setInterval(updateTimer, 1000);
updateTimer();

async function fetchData() {
    try {
        const response = await fetch("api/index.js");
        const data = await response.json();

        /*
        Format data harus seperti ini dari api/index.js:
        {
            periode: "123456",
            angka: 6,
            prediksi: "Besar",
            status: "WIN" atau "LOSE"
        }
        */

        if (data.periode !== currentPeriode) {
            currentPeriode = data.periode;

            document.getElementById("periode").innerText = data.periode;
            document.getElementById("prediksi").innerText = data.prediksi;
            document.getElementById("status").innerText = data.status;

            const kategori = getKategori(data.angka);

            historyData.unshift({
                periode: data.periode,
                angka: data.angka,
                kategori: kategori,
                prediksi: data.prediksi,
                status: data.status
            });

            if (historyData.length > 5) {
                historyData.pop();
            }

            renderTable();
        }

    } catch (error) {
        console.log("Gagal ambil data:", error);
    }
}

function renderTable() {
    const table = document.getElementById("resultTable");
    table.innerHTML = "";

    historyData.forEach(item => {
        const row = `
            <tr>
                <td>${item.periode}</td>
                <td>${item.angka}</td>
                <td class="${item.kategori.toLowerCase()}">${item.kategori}</td>
                <td>${item.prediksi}</td>
                <td class="${item.status.toLowerCase()}">${item.status}</td>
            </tr>
        `;
        table.innerHTML += row;
    });
}

setInterval(fetchData, 2000);
fetchData();
</script>

</body>
</html>
