<!DOCTYPE html>
<html>
<head>
  <title>WEB 55 PANEL</title>
  <style>
    body{
      margin:0;
      background:#111;
      color:white;
      font-family:Arial;
      display:flex;
    }

    /* 25% kiri */
    .panel{
      width:25%;
      background:#1c1c1c;
      padding:10px;
      overflow:auto;
      height:100vh;
    }

    /* 75% kanan */
    .web55{
      width:75%;
      height:100vh;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th,td{
      border:1px solid #333;
      padding:6px;
      text-align:center;
    }

    th{
      background:#222;
    }

    .win{
      color:#00ff00;
      font-weight:bold;
    }

    .lose{
      color:#ff0000;
      font-weight:bold;
    }
  </style>
</head>
<body>

<div class="panel">
  <table>
    <thead>
      <tr>
        <th>Periode</th>
        <th>Prediksi</th>
        <th>Count</th>
        <th>Hasil</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="dataBody"></tbody>
  </table>
</div>

<div class="web55">
  <iframe src="https://55five.io"></iframe>
</div>

<script>

let currentPeriode = null;
let currentRow = null;
let countdownInterval = null;
let resultChecked = false;

function kategori(num){
  return num <= 4 ? "Kecil" : "Besar";
}

function buatPrediksi(){
  return Math.random() > 0.5 ? "Besar" : "Kecil";
}

async function ambilAPI(){
  const res = await fetch("https://link55.vercel.app/api");
  return await res.json();
}

function tambahBaris(periode){
  const tbody = document.getElementById("dataBody");

  const tr = document.createElement("tr");

  const prediksi = buatPrediksi();

  tr.innerHTML = `
    <td>${periode}</td>
    <td>${prediksi}</td>
    <td class="count">-</td>
    <td class="hasil">-</td>
    <td class="status">-</td>
  `;

  tbody.insertBefore(tr, tbody.firstChild);

  currentRow = tr;
  return prediksi;
}

function mulaiCountdown(sisa){
  const countCell = currentRow.querySelector(".count");

  clearInterval(countdownInterval);

  countdownInterval = setInterval(() => {

    if(sisa <= 0){
      clearInterval(countdownInterval);
      return;
    }

    countCell.innerText = sisa;
    sisa--;

  },1000);
}

async function cekHasil(){
  const data = await ambilAPI();

  const hasil = data.hasil;
  const kategoriHasil = kategori(hasil);

  const hasilCell = currentRow.querySelector(".hasil");
  const statusCell = currentRow.querySelector(".status");
  const prediksi = currentRow.children[1].innerText;

  hasilCell.innerText = kategoriHasil + " " + hasil;

  if(prediksi === kategoriHasil){
    statusCell.innerText = "WIN";
    statusCell.className = "status win";
  }else{
    statusCell.innerText = "LOSE";
    statusCell.className = "status lose";
  }

  resultChecked = true;

  setTimeout(initPeriodeBaru,2000);
}

async function initPeriodeBaru(){
  resultChecked = false;

  const data = await ambilAPI();

  currentPeriode = data.periode;

  const pred = tambahBaris(currentPeriode);

  const detikSekarang = new Date().getSeconds();

  let sisa;

  if(detikSekarang < 30){
    sisa = 30 - detikSekarang;
