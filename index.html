<!DOCTYPE html>
<html>
<head>
    <title>Prediksi</title>
    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#000;
        }

        /* WEB FULL */
        iframe{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            border:none;
        }

        /* PANEL OVERLAY */
        .panel{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            background:rgba(0,0,0,0.85);
            color:white;
            padding:10px;
            z-index:9999;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:10px;
            font-size:13px;
        }

        th,td{
            border:1px solid #444;
            padding:4px;
            text-align:center;
        }

        th{
            background:#222;
        }

        h2,h1{
            margin:3px 0;
        }

        .win{ color:lime; }
        .lose{ color:red; }

    </style>
</head>
<body>

<iframe src="https://551ck.com"></iframe>

<div class="panel">
    <h2>PERIODE: <span id="periode">-</span></h2>
    <h1>PREDIKSI: <span id="prediksi">-</span></h1>

    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Periode</th>
                <th>Prediksi</th>
                <th>Hasil</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="historyTable"></tbody>
    </table>
</div>

<script>

const API_URL = "https://NAMAVERSEL.vercel.app/api"; // GANTI ini

let lastPeriode = null;
let currentPrediction = null;
let historyData = [];
let countNumber = 0;

function kategori(num){
    return num >= 5 ? "Besar" : "Kecil";
}

function randomPrediksi(){
    return Math.random() < 0.5 ? "Besar" : "Kecil";
}

function renderTable(){
    const tbody = document.getElementById("historyTable");
    tbody.innerHTML = "";

    historyData.forEach(row=>{
        tbody.innerHTML += `
            <tr>
                <td>${row.count}</td>
                <td>${row.periode}</td>
                <td>${row.prediksi}</td>
                <td>${row.hasil}</td>
                <td class="${row.status === 'WIN' ? 'win' : 'lose'}">${row.status}</td>
            </tr>
        `;
    });
}

async function fetchData(){
    try{
        const res = await fetch(API_URL + "?t=" + Date.now());
        const data = await res.json();

        if(!data || !data.periode) return;

        if(data.periode !== lastPeriode){

            if(lastPeriode !== null && historyData.length > 0){
                const hasilKategori = kategori(data.hasil);
                const status = (currentPrediction === hasilKategori) ? "WIN" : "LOSE";

                historyData[0].hasil = data.hasil;
                historyData[0].status = status;
            }

            currentPrediction = randomPrediksi();
            countNumber++;

            historyData.unshift({
                periode:data.periode,
                prediksi:currentPrediction,
                count:countNumber,
                hasil:"-",
                status:"-"
            });

            if(historyData.length > 10){
                historyData.pop();
            }

            lastPeriode = data.periode;

            document.getElementById("periode").innerText = data.periode;
            document.getElementById("prediksi").innerText = currentPrediction;

            renderTable();
        }

    }catch(err){
        console.log("Error:",err);
    }
}

setInterval(fetchData,5000);
fetchData();

</script>

</body>
</html>
