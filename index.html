<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>55Five Prediction Dashboard</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #121212; font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* Layout Split 35/65 */
        #top-panel { height: 35vh; width: 100%; padding: 10px; box-sizing: border-box; border-bottom: 2px solid #ff4444; background: #1a1a1a; overflow-y: auto; }
        #bottom-panel { height: 65vh; width: 100%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Tabel Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; table-layout: fixed; }
        th { background: #333; color: #888; font-size: 11px; padding: 6px; text-transform: uppercase; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #2a2a2a; font-size: 13px; font-weight: bold; }
        
        /* Status & Warna */
        .win { color: #00ff00; background: rgba(0, 255, 0, 0.05); }
        .lose { color: #ff4444; background: rgba(255, 68, 68, 0.05); }
        .timer { color: #ffeb3b; font-family: monospace; font-size: 16px; }
        .period { color: #03a9f4; }
        .running { font-style: italic; color: #ff9800; }
    </style>
</head>
<body>

<div id="top-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <div id="status" style="font-size: 11px; color: #666;">Menunggu Detik 01/31...</div>
        <div style="font-size: 12px;">Prediksi Berikutnya: <span id="next-guess" style="color: #ffeb3b;">---</span></div>
    </div>
    
    <table>
        <thead>
            <tr>
                <th width="20%">Periode</th>
                <th width="20%">Prediksi</th>
                <th width="15%">Count</th>
                <th width="25%">Hasil</th>
                <th width="20%">Status</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <!-- Data baris akan muncul di sini -->
        </tbody>
    </table>
</div>

<div id="bottom-panel">
    <iframe src="https://55x4mqd.com"></iframe>
</div>

<script>
    // DATA DARI CODE ANDA
    const AUTH_HEADER = "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpYXQiOiIxNzM3MjUyMzk3IiwibmJmIjoiMTczNzI1MjM5NyIsImV4cCI6IjE3MzcyNTQxOTciLCJodHRwOi8vc2NoZW1hcy5taWNyb3NvZnQuY29tL3dzLzIwMDgvMDYvaWRlbnRpdHkvY2xhaW1zL2V4cGlyYXRpb24iOiIxLzE5LzIwMjUgOTozNjozNyBBTSIsImh0dHA6Ly9zY2hlbWFzLm1pY3Jvc29mdC5jb20vd3MvMjAwOC8wNi9pZGVudGl0eS9jbGFpbXMvcm9sZSI6IkFjY2Vzc19Ub2tlbiIsIlVzZXJJZCI6IjQ0MTgwNCIsIlVzZXJOYW1lIjoiNjI4NTc5NjI5NzE4OSIsIlVzZXJQaG90byI6Imh0dHBzOi8vYXBpLmxpZ2h0c3BhY2VjZG4uY29tL2ltZy9hdmF0YXIuY2ZhOGRkOWQuc3ZnIiwiTmlja05hbWUiOiJSYWNrbmFyb2NLIiwiQW1vdW50IjoiMTM3LjAwIiwiSW50ZWdyYWwiOiIwIiwiTG9naW5NYXJrIjoiSDUiLCJMb2dpblRpbWUiOiIxLzE5LzIwMjUgOTowNjozNyBBTSIsIkxvZ2luSVBBZGRyZXNzIjoiMTE0LjEwLjEzNC4xODIiLCJEYk51bWJlciI6IjAiLCJJc3ZhbGlkYXRvciI6IjAiLCJLZXlDb2RlIjoiNTgwIiwiVG9rZW5UeXBlIjoiQWNjZXNzX1Rva2VuIiwiUGhvbmVUeXBlIjoiMSIsIlVzZXJUeXBlIjoiMCIsIlVzZXJOYW1lMiI6IiIsImlzcyI6Imp3dElzc3VlciIsImF1ZCI6ImxvdHRlcnlUaWNrZXQifQ.gSi3-FxVwLXKTA1drTBTrA6HqiASn6eBkmsWMyW2HP0";
    const PROXY = "https://corsproxy.io?";
    const API_URL = "https://newapi.55lottertttapi.com/api/webapi/GetNoaverageEmerdList";
    
    let history = [];
    let currentPrediction = "BESAR";
    let isLocked = false;

    function engine() {
        const now = new Date();
        const sec = now.getSeconds();
        
        // Logika Hitung Mundur (Count) sesuai Web 55
        let count = (sec < 30) ? (30 - sec) : (60 - sec);
        updateLiveDisplay(count);

        // Ambil Hasil (Detik 1 & 31)
        if ((sec === 1 || sec === 31) && !isLocked) {
            isLocked = true;
            fetchResult();
        }

        // Siapkan Prediksi Baru (Detik 3 & 33)
        if (sec === 3 || sec === 33) {
            isLocked = false;
            generatePrediction();
        }
    }

    async function fetchResult() {
        document.getElementById('status').innerText = "Syncing Data...";
        try {
            const response = await fetch(PROXY + encodeURIComponent(API_URL), {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json; charset=UTF-8',
                    'Authorization': AUTH_HEADER 
                },
                body: JSON.stringify({
                    "pageSize": 10, "pageNo": 1, "typeId": 30, "language": 0,
                    "random": "b631eb26bac6403e99093913e5bb48c5",
                    "signature": "A6203E85132E5FE26B5F43DDF1ECDD07",
                    "timestamp": Date.now()
                })
            });

            const res = await response.json();
            const data = res.data.list[0];
            
            const period = data.issueNumber.toString().slice(-5);
            const num = parseInt(data.number.split(",").pop());
            const cat = num >= 5 ? "BESAR" : "KECIL";
            const status = (currentPrediction === cat) ? "WIN" : "LOSE";

            updateHistory(period, currentPrediction, num, cat, status);
            document.getElementById('status').innerText = "Data Updated";
        } catch (e) {
            document.getElementById('status').innerText = "API Error / Token Expired";
        }
    }

    function updateHistory(period, pred, num, cat, stat) {
        history.unshift({ period, pred, num, cat, stat });
        if (history.length > 6) history.pop(); // Maksimal 6 baris riwayat
        render();
    }

    function generatePrediction() {
        currentPrediction = Math.random() > 0.5 ? "BESAR" : "KECIL";
        document.getElementById('next-guess').innerText = currentPrediction;
    }

    function updateLiveDisplay(c) {
        const live = document.getElementById('live-count');
        if (live) live.innerText = c + "s";
    }

    function render() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = "";

        // Baris Aktif (Sedang Berjalan)
        tbody.innerHTML += `
            <tr>
                <td class="period running">Next</td>
                <td>${currentPrediction}</td>
                <td class="timer" id="live-count">--s</td>
                <td>--</td>
                <td style="color: #666;">WAIT</td>
            </tr>
        `;

        // Baris Riwayat
        history.forEach(item => {
            tbody.innerHTML += `
                <tr class="${item.stat.toLowerCase()}">
                    <td class="period">${item.period}</td>
                    <td>${item.pred}</td>
                    <td>0s</td>
                    <td>${item.cat} (${item.num})</td>
                    <td>${item.stat}</td>
                </tr>
            `;
        });
    }

    render();
    generatePrediction();
    setInterval(engine, 1000);
</script>
</body>
</html>
