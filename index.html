<!DOCTYPE html>
<html>
<head>
    <title>Prediksi Random</title>
    <style>
        body{
            margin:0;
            font-family: Arial;
            background:#111;
            color:white;
        }

        .container{
            display:flex;
            flex-direction:column;
            height:100vh;
        }

        /* 25% ATAS */
        .top{
            height:25%;
            padding:15px;
            background:#181818;
            overflow:auto;
        }

        /* 75% BAWAH */
        .bottom{
            height:75%;
        }

        iframe{
            width:100%;
            height:100%;
            border:none;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:10px;
        }

        th,td{
            border:1px solid #444;
            padding:6px;
            text-align:center;
        }

        th{
            background:#222;
        }

        h2,h1{
            margin:5px 0;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 25% AREA PREDIKSI -->
    <div class="top">

        <h2>PERIODE: <span id="periode">-</span></h2>
        <h1>PREDIKSI: <span id="prediksi">-</span></h1>

        <table>
            <thead>
                <tr>
                    <th>Count</th>
                    <th>Periode</th>
                    <th>Prediksi</th>
                    <th>Hasil</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="historyTable"></tbody>
        </table>

    </div>

    <!-- 75% WEB 55 -->
    <div class="bottom">
        <iframe src="https://55x4mqd.com/#/"></iframe>
    </div>

</div>

<script>

let lastPeriode = null;
let currentPrediction = null;
let historyData = [];
let countNumber = 0;

function kategori(num){
    return num >= 5 ? "Besar" : "Kecil";
}

function randomPrediksi(){
    return Math.random() < 0.5 ? "Besar" : "Kecil";
}

function renderTable(){
    const tbody = document.getElementById("historyTable");
    tbody.innerHTML = "";

    historyData.forEach(row=>{
        tbody.innerHTML += `
            <tr>
                <td>${row.count}</td>
                <td>${row.periode}</td>
                <td>${row.prediksi}</td>
                <td>${row.hasil}</td>
                <td>${row.status}</td>
            </tr>
        `;
    });
}

async function fetchData(){
    try{
        const res = await fetch("/api?t=" + Date.now());
        const data = await res.json();

        if(!data || !data.periode) return;

        // PERIODE BARU
        if(data.periode !== lastPeriode){

            // Update hasil periode sebelumnya
            if(lastPeriode !== null && historyData.length > 0){
                const hasilKategori = kategori(data.hasil);
                const status = (currentPrediction === hasilKategori) ? "WIN" : "LOSE";

                historyData[0].hasil = data.hasil;
                historyData[0].status = status;
            }

            // Buat prediksi baru
            currentPrediction = randomPrediksi();
            countNumber++;

            historyData.unshift({
                periode:data.periode,
                prediksi:currentPrediction,
                count:countNumber,
                hasil:"-",
                status:"-"
            });

            if(historyData.length > 10){
                historyData.pop();
            }

            lastPeriode = data.periode;

            document.getElementById("periode").innerText = data.periode;
            document.getElementById("prediksi").innerText = currentPrediction;

            renderTable();
        }

    }catch(err){
        console.log("Error:",err);
    }
}

// Refresh tiap 5 detik
setInterval(fetchData,5000);
fetchData();

</script>

</body>
</html>
