<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>55Five Prediction Pro</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #121212; font-family: sans-serif; color: white; }
        #top-panel { height: 35vh; width: 100%; padding: 10px; box-sizing: border-box; border-bottom: 2px solid #ff4444; background: #1a1a1a; overflow-y: auto; }
        #bottom-panel { height: 65vh; width: 100%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 5px; table-layout: fixed; }
        th { background: #333; color: #888; font-size: 10px; padding: 6px; text-transform: uppercase; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #2a2a2a; font-size: 12px; font-weight: bold; }
        .win { color: #00ff00; background: rgba(0, 255, 0, 0.1); }
        .lose { color: #ff4444; background: rgba(255, 68, 68, 0.1); }
        .timer { color: #ffeb3b; font-family: monospace; font-size: 16px; }
        .period { color: #03a9f4; }
    </style>
</head>
<body>

<div id="top-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <div id="status" style="font-size: 11px; color: #888;">Menghubungkan...</div>
        <div style="font-size: 12px;">Prediksi: <span id="next-guess" style="color: #ffeb3b;">---</span></div>
    </div>
    
    <table>
        <thead>
            <tr>
                <th width="20%">Periode</th>
                <th width="20%">Prediksi</th>
                <th width="15%">Count</th>
                <th width="25%">Hasil</th>
                <th width="20%">Status</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<div id="bottom-panel">
    <iframe src="https://55x4mqd.com"></iframe>
</div>

<script>
    // MASUKKAN TOKEN TERBARU ANDA DI SINI (WAJIB FRESH)
    const AUTH_HEADER = "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpYXQiOiIxNzM3MjUyMzk3IiwibmJmIjoiMTczNzI1MjM5NyIsImV4cCI6IjE3MzcyNTQxOTciLCJodHRwOi8vc2NoZW1hcy5taWNyb3NvZnQuY29tL3dzLzIwMDgvMDYvaWRlbnRpdHkvY2xhaW1zL2V4cGlyYXRpb24iOiIxLzE5LzIwMjUgOTozNjozNyBBTSIsImh0dHA6Ly9zY2hlbWFzLm1pY3Jvc29mdC5jb20vd3MvMjAwOC8wNi9pZGVudGl0eS9jbGFpbXMvcm9sZSI6IkFjY2Vzc19Ub2tlbiIsIlVzZXJJZCI6IjQ0MTgwNCIsIlVzZXJOYW1lIjoiNjI4NTc5NjI5NzE4OSIsIlVzZXJQaG90byI6Imh0dHBzOi8vYXBpLmxpZ2h0c3BhY2VjZG4uY29tL2ltZy9hdmF0YXIuY2ZhOGRkOWQuc3ZnIiwiTmlja05hbWUiOiJSYWNrbmFyb2NLIiwiQW1vdW50IjoiMTM3LjAwIiwiSW50ZWdyYWwiOiIwIiwiTG9naW5NYXJrIjoiSDUiLCJMb2dpblRpbWUiOiIxLzE5LzIwMjUgOTowNjozNyBBTSIsIkxvZ2luSVBBZGRyZXNzIjoiMTE0LjEwLjEzNC4xODIiLCJEYk51bWJlciI6IjAiLCJJc3ZhbGlkYXRvciI6IjAiLCJLZXlDb2RlIjoiNTgwIiwiVG9rZW5UeXBlIjoiQWNjZXNzX1Rva2VuIiwiUGhvbmVUeXBlIjoiMSIsIlVzZXJUeXBlIjoiMCIsIlVzZXJOYW1lMiI6IiIsImlzcyI6Imp3dElzc3VlciIsImF1ZCI6ImxvdHRlcnlUaWNrZXQifQ.gSi3-FxVwLXKTA1drTBTrA6HqiASn6eBkmsWMyW2HP0";
    
    const PROXY = "https://api.allorigins.win";
    const API_ISSUE = "https://newapi.55lottertttapi.com/api/webapi/GetGameIssue";
    const API_LIST = "https://newapi.55lottertttapi.com/api/webapi/GetNoaverageEmerdList";

    let history = [];
    let currentPrediction = "BESAR";
    let activePeriod = "-----";
    let isFetching = false;

    function startEngine() {
        generatePrediction();
        setInterval(async () => {
            const now = new Date();
            const sec = now.getSeconds();
            
            let count = (sec < 30) ? (30 - sec) : (60 - sec);
            const live = document.getElementById('live-count');
            if (live) live.innerText = count + "s";
            
            // Logika get_periode() setiap detik 0 atau 30
            if (sec === 0 || sec === 30) {
                updateCurrentPeriod();
            }

            // Logika _fetch_number(1,0) setiap detik 1 atau 31
            if ((sec === 1 || sec === 31) && !isFetching) {
                isFetching = true;
                fetchFinalResult();
            }

            if (sec === 3 || sec === 33) {
                isFetching = false;
                generatePrediction();
            }
        }, 1000);
    }

    async function updateCurrentPeriod() {
        const data = JSON.stringify({
            "typeId": 30, "language": 0, 
            "random": "166b81d9568e4123a83a2c7fdb80b7d9",
            "signature": "5DB43C344C7381B72B5262FFB3572444", 
            "timestamp": Math.floor(Date.now()/1000)
        });

        try {
            const res = await fetch(PROXY + encodeURIComponent(API_ISSUE), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json; charset=UTF-8', 'Authorization': AUTH_HEADER },
                body: data
            });
            const json = await res.json();
            if (json.data && json.data.issueNumber) {
                activePeriod = json.data.issueNumber.toString().slice(-5);
                render();
            }
        } catch (e) { console.log("GetGameIssue Error"); }
    }

    async function fetchFinalResult() {
        document.getElementById('status').innerText = "Syncing...";
        const data = JSON.stringify({
            "pageSize": 10, "pageNo": 1, "typeId": 30, "language": 0,
            "random": "b631eb26bac6403e99093913e5bb48c5", 
            "signature": "A6203E85132E5FE26B5F43DDF1ECDD07", 
            "timestamp": Math.floor(Date.now()/1000)
        });

        try {
            const res = await fetch(PROXY + encodeURIComponent(API_LIST), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json; charset=UTF-8', 'Authorization': AUTH_HEADER },
                body: data
            });
            const result = await res.json();
            
            // Logika Sama dengan Python: result.get('data').get('list')[0]
            const lst = result.data.list;
            if (lst && lst.length > 0) {
                const item terbaru = lst[0];
                const resPeriod = terbaru.issueNumber.toString().slice(-5);
                
                // Logika: num = int(num.strip().split(",")[-1])
                const rawNumber = terbaru.number;
                const num = parseInt(rawNumber.split(",").pop());
                
                const cat = num >= 5 ? "BESAR" : "KECIL";
                const status = (currentPrediction === cat) ? "WIN" : "LOSE";

                history.unshift({ period: resPeriod, pred: currentPrediction, num, cat, stat: status });
                if (history.length > 6) history.pop();
                
                render();
                document.getElementById('status').innerText = "OK";
            }
        } catch (e) {
            document.getElementById('status').innerText = "Error API/Token";
        }
    }

    function generatePrediction() {
        currentPrediction = Math.random() > 0.5 ? "BESAR" : "KECIL";
        document.getElementById('next-guess').innerText = currentPrediction;
        render();
    }

    function render() {
        const tbody = document.getElementById('table-body');
        let html = `<tr>
            <td class="period">${activePeriod}</td>
            <td>${currentPrediction}</td>
            <td class="timer" id="live-count">--s</td>
            <td>--</td>
            <td style="color:#666;">WAIT</td>
        </tr>`;

        history.forEach(item => {
            html += `<tr class="${item.stat.toLowerCase()}">
                <td class="period">${item.period}</td>
                <td>${item.pred}</td>
                <td>0s</td>
                <td>${item.cat} (${item.num})</td>
                <td>${item.stat}</td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    window.onload = startEngine;
</script>
</body>
</html>
